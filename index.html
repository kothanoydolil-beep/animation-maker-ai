<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim Animation Studio</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Top Navbar */
        .navbar { height: 50px; background: #2d2d2d; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #444; }
        .btn-download { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* Main Workspace */
        .main-content { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar Asset Library */
        .sidebar { width: 260px; background: #252525; padding: 15px; border-right: 1px solid #444; overflow-y: auto; }
        .sidebar h3 { font-size: 14px; margin-bottom: 15px; color: #aaa; text-transform: uppercase; }
        .asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .asset-item { background: #333; border-radius: 8px; padding: 5px; cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
        .asset-item:hover { border-color: #3498db; }
        .asset-item img { width: 100%; border-radius: 5px; height: 100px; object-fit: contain; }
        
        /* Canvas Area */
        .canvas-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #121212; position: relative; }
        canvas { box-shadow: 0 0 50px rgba(0,0,0,0.5); background: white; }

        /* Bottom Timeline Area */
        .timeline-area { height: 200px; background: #252525; border-top: 1px solid #444; padding: 10px; }
        .timeline-controls { margin-bottom: 10px; display: flex; gap: 15px; }
        .timeline-track { height: 30px; background: #333; margin-bottom: 5px; border-radius: 4px; position: relative; overflow: hidden; }
        .track-bar { height: 100%; background: #3498db; width: 60%; opacity: 0.7; }
    </style>
</head>
<body>

<div class="navbar">
    <div><strong>Project:</strong> Islamic Animation Maker</div>
    <button class="btn-download" onclick="downloadImage()">Download Frame</button>
</div>

<div class="main-content">
    <div class="sidebar">
        <h3>Characters</h3>
        <div class="asset-grid">
            <div class="asset-item" onclick="addCharacter('young-man.png')"><img src="young-man.png" alt="যুবক"></div>
            <div class="asset-item" onclick="addCharacter('kid-boy.png')"><img src="kid-boy.png" alt="বাচ্চা"></div>
            <div class="asset-item" onclick="addCharacter('hijabi-girl.png')"><img src="hijabi-girl.png" alt="মেয়ে"></div>
        </div>
        <h3 style="margin-top:20px;">Backgrounds</h3>
        <div class="asset-grid">
            <div class="asset-item" onclick="setBackground('mosque-bg.jpg')"><img src="mosque-bg.jpg" alt="মসজিদ"></div>
            <div class="asset-item" onclick="setBackground('room-bg.jpg')"><img src="room-bg.jpg" alt="রুম"></div>
        </div>
    </div>

    <div class="canvas-area">
        <canvas id="studioCanvas" width="800" height="450"></canvas>
    </div>
</div>

<div class="timeline-area">
    <div class="timeline-controls">
        <span>▶ Play</span> <span>⏹ Stop</span> <span>Time: 00:01</span>
    </div>
    <div class="timeline-track"><div class="track-bar"></div></div>
    <div class="timeline-track" style="background: #3a3a3a;"><div class="track-bar" style="width: 40%; background: #2ecc71;"></div></div>
</div>

<script>
    const canvas = new fabric.Canvas('studioCanvas');

    function addCharacter(url) {
        fabric.Image.fromURL(url, function(img) {
            img.scaleToWidth(150);
            canvas.add(img);
            canvas.centerObject(img);
        }, { crossOrigin: 'anonymous' });
    }

    function setBackground(url) {
        fabric.Image.fromURL(url, function(img) {
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                scaleX: canvas.width / img.width,
                scaleY: canvas.height / img.height
            });
        }, { crossOrigin: 'anonymous' });
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'animation-frame.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
