<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim AI Animation Studio - Pro</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --dark-bg: #0f0f0f;
            --sidebar-bg: #1a1a1a;
            --accent-color: #3d5afe;
            --text-main: #ffffff;
            --text-dim: #999;
            --border: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: var(--dark-bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header Navigation */
        header { height: 55px; background: var(--sidebar-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 10px; color: var(--accent-color); font-weight: bold; font-size: 1.2rem; }
        .top-tools { display: flex; gap: 10px; }
        .btn-action { background: var(--accent-color); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-clear { background: #ff1744; }

        /* Main Workspace Layout */
        main { display: flex; flex: 1; overflow: hidden; }

        /* Left Side Sidebar */
        .sidebar { width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--accent-color); border-bottom-color: var(--accent-color); background: rgba(61, 90, 254, 0.05); }

        .asset-library { flex: 1; padding: 15px; overflow-y: auto; }
        .section-title { font-size: 12px; color: var(--text-dim); text-transform: uppercase; margin: 15px 0 10px; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .asset-card { background: #262626; border-radius: 8px; padding: 8px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; position: relative; }
        .asset-card:hover { border-color: var(--accent-color); background: #333; }
        .asset-card img { width: 100%; height: 90px; object-fit: contain; border-radius: 4px; background: #000; }
        .asset-card p { font-size: 11px; text-align: center; margin-top: 6px; color: #ccc; }

        /* Middle Canvas Area */
        .stage { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; padding: 40px; }
        .canvas-wrapper { box-shadow: 0 0 60px rgba(0,0,0,0.5); background: white; border-radius: 2px; }
        
        /* Floating Controls */
        .floating-controls { position: absolute; right: 20px; top: 20px; display: flex; flex-direction: column; gap: 8px; background: var(--sidebar-bg); padding: 8px; border-radius: 8px; border: 1px solid var(--border); }
        .f-btn { width: 40px; height: 40px; border: none; background: #222; color: #fff; border-radius: 4px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .f-btn:hover { background: var(--accent-color); }

        /* Bottom Timeline Area */
        footer { height: 220px; background: var(--sidebar-bg); border-top: 1px solid var(--border); padding: 15px; }
        .timeline-bar { height: 40px; background: #111; border-radius: 4px; position: relative; margin-top: 15px; border: 1px solid #333; }
        .playhead { position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: #ff1744; z-index: 5; box-shadow: 0 0 10px red; }
        .timeline-controls { display: flex; align-items: center; gap: 20px; margin-bottom: 10px; }
        .p-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: #00e676; color: #000; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Text Input Styling */
        .text-adder { display: flex; gap: 10px; margin-bottom: 20px; }
        .text-adder input { flex: 1; background: #262626; border: 1px solid var(--border); padding: 10px; border-radius: 6px; color: white; outline: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-area"><i class="fas fa-magic"></i> Muslim Studio AI</div>
    <div class="top-tools">
        <button class="btn-action btn-clear" onclick="clearAll()"><i class="fas fa-trash"></i> সব মুছুন</button>
        <button class="btn-action" onclick="exportImg()"><i class="fas fa-file-export"></i> সেভ করুন</button>
    </div>
</header>

<main>
    <div class="sidebar">
        <div class="tabs">
            <button class="tab-btn active"><i class="fas fa-users"></i> ক্যারেক্টার</button>
            <button class="tab-btn"><i class="fas fa-image"></i> ব্যাকগ্রাউন্ড</button>
        </div>
        
        <div class="asset-library">
            <div class="text-adder">
                <input type="text" id="t-input" placeholder="বাংলায় লিখুন...">
                <button class="btn-action" onclick="addText()"><i class="fas fa-plus"></i></button>
            </div>

            <p class="section-title">পছন্দের ক্যারেক্টার বেছে নিন</p>
            <div class="grid">
                <div class="asset-card" onclick="addChar('https://i.imgur.com')"><img src="https://i.imgur.com"><p>যুবক</p></div>
                <div class="asset-card" onclick="addChar('https://i.imgur.com')"><img src="https://i.imgur.com"><p>ছোট ছেলে</p></div>
                <div class="asset-card" onclick="addChar('https://i.imgur.com')"><img src="https://i.imgur.com"><p>মেয়ে</p></div>
                <div class="asset-card" onclick="addChar('https://i.imgur.com')"><img src="https://i.imgur.com"><p>বৃদ্ধ</p></div>
            </div>

            <p class="section-title">ব্যাকগ্রাউন্ড</p>
            <div class="grid">
                <div class="asset-card" onclick="setBG('https://i.imgur.com')"><img src="https://i.imgur.com"><p>মসজিদ</p></div>
                <div class="asset-card" onclick="setBG('https://i.imgur.com')"><img src="https://i.imgur.com"><p>ঘর</p></div>
                <div class="asset-card" onclick="setBG('https://i.imgur.com')"><img src="https://i.imgur.com"><p>প্রকৃতি</p></div>
                <div class="asset-card" onclick="setBG('https://i.imgur.com')"><img src="https://i.imgur.com"><p>মাদ্রাসা</p></div>
            </div>
        </div>
    </div>

    <div class="stage">
        <div class="canvas-wrapper">
            <canvas id="studio" width="900" height="500"></canvas>
        </div>
        
        <div class="floating-controls">
            <button class="f-btn" onclick="deleteObj()" title="মুছুন"><i class="fas fa-trash-alt"></i></button>
            <button class="f-btn" onclick="flipObj()" title="ঘোরান"><i class="fas fa-exchange-alt"></i></button>
            <button class="f-btn" onclick="toFront()" title="উপরে আনুন"><i class="fas fa-layer-group"></i></button>
        </div>
    </div>
</main>

<footer>
    <div class="timeline-controls">
        <button class="p-btn" id="play" onclick="playAnim()"><i class="fas fa-play"></i></button>
        <div>
            <span style="font-size: 13px; color: #888;">টাইমলাইন</span><br>
            <strong id="timer">00:00:00</strong>
        </div>
    </div>
    <div class="timeline-bar" id="bar">
        <div class="playhead" id="head"></div>
        <div style="position: absolute; top: 10px; left: 10%; width: 60%; height: 20px; background: rgba(61,90,254,0.2); border: 1px solid var(--accent-color); border-radius: 3px; font-size: 10px; padding-left: 10px; line-height: 20px;">অ্যানিমেশন ট্র্যাক ০১</div>
    </div>
</footer>

<script>
    const canvas = new fabric.Canvas('studio');
    let isMoving = false;

    function addChar(url) {
        fabric.Image.fromURL(url, (img) => {
            img.scaleToWidth(180);
            img.set({ left: 100, top: 100, cornerColor: '#3d5afe', cornerSize: 8, transparentCorners: false });
            canvas.add(img);
            canvas.setActiveObject(img);
        }, { crossOrigin: 'anonymous' });
    }

    function setBG(url) {
        fabric.Image.fromURL(url, (img) => {
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                scaleX: canvas.width / img.width,
                scaleY: canvas.height / img.height
            });
        }, { crossOrigin: 'anonymous' });
    }

    function addText() {
        const val = document.getElementById('t-input').value;
        if (!val) return;
        canvas.add(new fabric.IText(val, { left: 300, top: 200, fontFamily: 'Hind Siliguri', fontSize: 40, fill: '#333' }));
        document.getElementById('t-input').value = '';
    }

    function playAnim() {
        const obj = canvas.getActiveObject();
        if (!obj) return alert("একটি ক্যারেক্টার সিলেক্ট করুন!");
        
        if (!isMoving) {
            isMoving = true;
            document.getElementById('play').innerHTML = '<i class="fas fa-pause"></i>';
            
            // ক্যারেক্টার মুভমেন্ট
            obj.animate('left', obj.left + 400, {
                onChange: canvas.renderAll.bind(canvas),
                duration: 3000,
                easing: fabric.util.ease.easeInOutQuad,
                onComplete: () => { resetUI(); }
            });

            // প্লেহেড মুভমেন্ট
            let p = 0;
            const anim = setInterval(() => {
                p += 0.5;
                document.getElementById('head').style.left = p + "%";
                if (p >= 100 || !isMoving) clearInterval(anim);
            }, 15);
        } else {
            resetUI();
        }
    }

    function resetUI() {
        isMoving = false;
        document.getElementById('play').innerHTML = '<i class="fas fa-play"></i>';
        document.getElementById('head').style.left = '0%';
    }

    function deleteObj() { const active = canvas.getActiveObject(); if (active) canvas.remove(active); }
    function flipObj() { const active = canvas.getActiveObject(); if (active) { active.set('flipX', !active.flipX); canvas.renderAll(); } }
    function toFront() { const active = canvas.getActiveObject(); if (active) { active.bringToFront(); canvas.renderAll(); } }
    function clearAll() { if(confirm("সব মুছে ফেলবেন?")) { canvas.clear(); canvas.setBackgroundColor('#fff', canvas.renderAll.bind(canvas)); } }
    function exportImg() { const link = document.createElement('a'); link.download = 'scene.png'; link.href = canvas.toDataURL(); link.click(); }
</script>

</body>
</html>
