<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim Animation Studio - AI Powered</title>
    <!-- Fabric.js Library for Canvas -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    
    <style>
        :root {
            --bg-dark: #121212;
            --sidebar-bg: #1e1e1e;
            --accent-blue: #00a8ff;
            --accent-green: #2ecc71;
            --text-color: #e0e0e0;
            --border-color: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-dark); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Top Header */
        header { height: 60px; background: var(--sidebar-bg); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 2px solid var(--border-color); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent-blue); display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 15px; }
        .btn-top { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-download { background: var(--accent-blue); color: white; }
        .btn-clear { background: #e74c3c; color: white; }
        .btn-top:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Main Workspace */
        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar - Asset Library */
        .sidebar { width: 300px; background: var(--sidebar-bg); padding: 20px; border-right: 2px solid var(--border-color); overflow-y: auto; }
        .sidebar h3 { font-size: 15px; margin: 20px 0 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        .asset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .asset-box { background: #2a2a2a; border-radius: 10px; padding: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; text-align: center; position: relative; }
        .asset-box:hover { border-color: var(--accent-blue); background: #333; }
        .asset-box img { width: 100%; height: 90px; object-fit: contain; border-radius: 5px; background: #111; }
        .asset-box span { display: block; margin-top: 5px; font-size: 12px; color: #bbb; }

        /* Canvas Middle Area */
        .canvas-container-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; position: relative; padding: 20px; }
        canvas { background: white; border-radius: 5px; box-shadow: 0 0 40px rgba(0,168,255,0.2); }
        .canvas-controls { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; }
        .tool-btn { background: #333; color: white; border: 1px solid #555; width: 45px; height: 45px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .tool-btn:hover { background: var(--accent-blue); }

        /* Timeline Footer */
        footer { height: 180px; background: var(--sidebar-bg); border-top: 2px solid var(--border-color); padding: 15px 25px; }
        .timeline-header { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; }
        .play-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--accent-green); color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .timeline-track { width: 100%; height: 60px; background: #111; border-radius: 8px; position: relative; overflow: hidden; border: 1px solid #333; }
        .playhead { position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: #e74c3c; z-index: 10; box-shadow: 0 0 10px red; }
        .track-item { height: 40px; background: rgba(0, 168, 255, 0.3); border-radius: 4px; border: 1px solid var(--accent-blue); position: absolute; top: 10px; padding: 0 10px; line-height: 40px; font-size: 12px; }

        /* Floating Text Box */
        #text-editor { margin-bottom: 10px; display: flex; gap: 10px; }
        #text-editor input { padding: 8px; border-radius: 5px; border: 1px solid #444; background: #222; color: white; width: 250px; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <i class="fas fa-video"></i> Muslim Animation Studio AI
    </div>
    <div class="header-actions">
        <button class="btn-top btn-clear" onclick="clearCanvas()">Clear All</button>
        <button class="btn-top btn-download" onclick="downloadScene()"><i class="fas fa-download"></i> Download Scene</button>
    </div>
</header>

<div class="workspace">
    <!-- Sidebar: Asset Library -->
    <div class="sidebar">
        <h3>Characters (টুডি ক্যারেক্টার)</h3>
        <div class="asset-grid">
            <div class="asset-box" onclick="addCharacter('https://i.imgur.com', 'যুবক')">
                <img src="https://i.imgur.com">
                <span>যুবক</span>
            </div>
            <div class="asset-box" onclick="addCharacter('https://i.imgur.com', 'বাচ্চা')">
                <img src="https://i.imgur.com">
                <span>বাচ্চা</span>
            </div>
            <div class="asset-box" onclick="addCharacter('https://i.imgur.com', 'মেয়ে')">
                <img src="https://i.imgur.com">
                <span>মেয়ে</span>
            </div>
            <div class="asset-box" onclick="addCharacter('https://i.imgur.com', 'বৃদ্ধ')">
                <img src="https://i.imgur.com">
                <span>বৃদ্ধ</span>
            </div>
        </div>

        <h3>Backgrounds (পটভূমি)</h3>
        <div class="asset-grid">
            <div class="asset-box" onclick="setBG('https://i.imgur.com')">
                <img src="https://i.imgur.com">
                <span>মসজিদ</span>
            </div>
            <div class="asset-box" onclick="setBG('https://i.imgur.com')">
                <img src="https://i.imgur.com">
                <span>বাড়ি</span>
            </div>
            <div class="asset-box" onclick="setBG('https://i.imgur.com')">
                <img src="https://i.imgur.com">
                <span>প্রকৃতি</span>
            </div>
            <div class="asset-box" onclick="setBG('https://i.imgur.com')">
                <img src="https://i.imgur.com">
                <span>মাদ্রাসা</span>
            </div>
        </div>
    </div>

    <!-- Middle: Workspace -->
    <div class="canvas-container-main">
        <div id="text-editor">
            <input type="text" id="textInput" placeholder="এখানে কিছু লিখুন...">
            <button class="btn-top btn-download" onclick="addText()">টেক্সট যোগ করুন</button>
        </div>
        
        <canvas id="mainStudio" width="850" height="480"></canvas>
        
        <!-- Controls -->
        <div class="canvas-controls">
            <button class="tool-btn" onclick="bringFront()" title="সামনে আনুন"><i class="fas fa-layer-group"></i></button>
            <button class="tool-btn" onclick="deleteObject()" title="মুছে ফেলুন" style="color: #e74c3c;"><i class="fas fa-trash"></i></button>
            <button class="tool-btn" onclick="flipObject()" title="ঘোরান"><i class="fas fa-arrows-alt-h"></i></button>
        </div>
    </div>
</div>

<!-- Footer: Timeline -->
<footer>
    <div class="timeline-header">
        <button class="play-btn" id="playBtn" onclick="toggleAnimation()"><i class="fas fa-play"></i></button>
        <div>
            <strong>Timeline: 00:00:04</strong><br>
            <small style="color: #666;">একটি ক্যারেক্টার সিলেক্ট করে 'Play' চাপুন</small>
        </div>
    </div>
    <div class="timeline-track" id="track">
        <div class="playhead" id="playhead"></div>
        <div class="track-item" style="width: 60%; left: 0;">Character Animation Track 01</div>
    </div>
</footer>

<script>
    // Initialize Canvas
    const canvas = new fabric.Canvas('mainStudio');
    let isPlaying = false;
    let animationInterval;

    // ১. ক্যারেক্টার যোগ করার ফাংশন
    function addCharacter(url, label) {
        fabric.Image.fromURL(url, function(img) {
            img.scaleToWidth(180);
            img.set({
                left: 100,
                top: 100,
                cornerColor: '#00a8ff',
                cornerSize: 10,
                transparentCorners: false
            });
            canvas.add(img);
            canvas.setActiveObject(img);
            canvas.renderAll();
        }, { crossOrigin: 'anonymous' });
    }

    // ২. ব্যাকগ্রাউন্ড সেট করার ফাংশন
    function setBG(url) {
        fabric.Image.fromURL(url, function(img) {
            canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                scaleX: canvas.width / img.width,
                scaleY: canvas.height / img.height
            });
        }, { crossOrigin: 'anonymous' });
    }

    // ৩. টেক্সট যোগ করা
    function addText() {
        const val = document.getElementById('textInput').value;
        if (!val) return;
        const text = new fabric.IText(val, {
            left: 200,
            top: 200,
            fontFamily: 'Arial',
            fill: '#333'
        });
        canvas.add(text);
        document.getElementById('textInput').value = '';
    }

    // ৪. অ্যানিমেশন কন্ট্রোল
    function toggleAnimation() {
        const obj = canvas.getActiveObject();
        if (!obj) {
            alert("প্রথমে একটি ক্যারেক্টার বা অবজেক্ট সিলেক্ট করুন!");
            return;
        }

        const btn = document.getElementById('playBtn');
        const playhead = document.getElementById('playhead');
        
        if (!isPlaying) {
            isPlaying = true;
            btn.innerHTML = '<i class="fas fa-pause"></i>';
            btn.style.background = '#e67e22';

            // ক্যারেক্টার মুভমেন্ট
            obj.animate('left', obj.left + 300, {
                onChange: canvas.renderAll.bind(canvas),
                duration: 4000,
                easing: fabric.util.ease.easeInOutQuad
            });

            // প্লে-হেড মুভমেন্ট (Timeline)
            let pos = 0;
            animationInterval = setInterval(() => {
                pos += 0.4;
                playhead.style.left = pos + "%";
                if (pos >= 100) stopAnim();
            }, 16);

        } else {
            stopAnim();
        }
    }

    function stopAnim() {
        isPlaying = false;
        clearInterval(animationInterval);
        document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
        document.getElementById('playBtn').style.background = '#2ecc71';
        document.getElementById('playhead').style.left = '0%';
    }

    // ৫. টুলস ফাংশন
    function deleteObject() {
        const active = canvas.getActiveObject();
        if (active) canvas.remove(active);
    }

    function flipObject() {
        const obj = canvas.getActiveObject();
        if (obj) {
            obj.set('flipX', !obj.flipX);
            canvas.renderAll();
        }
    }

    function bringFront() {
        const obj = canvas.getActiveObject();
        if (obj) {
            obj.bringToFront();
            canvas.renderAll();
        }
    }

    function clearCanvas() {
        if(confirm("আপনি কি সব কিছু মুছে ফেলতে চান?")) {
            canvas.clear();
            canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas));
        }
    }

    // ৬. ইমেজ ডাউনলোড
    function downloadScene() {
        const link = document.createElement('a');
        link.download = 'animation-frame.png';
        link.href = canvas.toDataURL({ format: 'png', quality: 1 });
        link.click();
    }
</script>

</body>
</html>
